<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>웹개발 교육 상담 문의</title>
</head>
<body>
    <header></header>
    <main>
        <h1>웹 개발 교육 상담 문의</h1>
        <p>HTML, CSS, JavaScript, React, 프론트엔드 교육 과정에 대해 궁금한 내용을 남겨주세요. 담장자가 확인 후 안내해드립니다.</p>
        <form action="#" method="get">
        <fieldset>
            <legend>상담 신청 정보</legend>
            <!-- 이름 -->
            <div>
                <label for="name">이름 <sup>*</sup></label>
                <input type="text" name="name" placeholder="이름을 입력하세요.">
                <p>실명을 입력해주세요.</p>
            </div>
            <!-- 이메일 -->
            <div>
                <label for="email">이메일 <sup>*</sup></label>
                <input type="email" name="email" placeholder="example@email.com.">
                <p>답변을 받을 이메일 주소를 입력해주세요.</p>
            </div>
            <!-- 연락처 -->
            <div>
                <label for="phone">연락처</label>
                <input type="tel" name="phone" placeholder="010-0000-0000">
            </div>
            <!-- 관심과정 -->
            <div>
                <label for="course">관심과정 <sup>*</sup></label>
                <select name="course">
                        <option value="선택">선택하세요</option>
                        <option value="html-css">HTML/CSS 기초</option>
                        <option value="javascript">JavaScript 입문</option>
                        <option value="fullstack">Fullstack 웹 개발</option>
                        <option value="react">React 프론트엔드</option>
                        </select>
            </div>
            <div>
                <!-- 문의내용 -->
                 <label for="message">문의내용</label>
                    <textarea id="message" placeholder="궁금한 내용을 자세히 입력해 주세요"></textarea>
                    <p class="example-text">예: 수업 일정, 수강 대상, 비용, 프로젝트 중심 수업 여부 등</p>
            </div>
            <div>
                <!-- 개인정보 동의 -->
                 <input type="checkbox" id="agree">
                 <label for="agree">개인정보 수집에 동의합니다. <sup>*</sup></label>
            </div>
            <div>
                <!-- 버튼(공간설정을 위해 div를 사용하는 것이 좋다.) -->
                  <button type="submit">상담 문의 보내기</button>
            </div>
        </fieldset>
        </form>
    </main>
    <footer></footer>
</body>
</html>
