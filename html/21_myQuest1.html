<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>웹 개발 교육 상담 문의</title>
    <style>
  ul {
    list-style-type: none; /* 점을 제거합니다 */
    padding-left: 0;      /* 점이 있던 왼쪽 여백까지 제거하여 정렬을 맞춥니다 */
  }
</style>
</head>
<body>
    <h1>웹 개발 교육 상담 문의</h1>
    <p>HTML, CSS, JavaScript, React, 프론트엔드 교육 과정에 대해 궁금한 내용을 남겨주세요. 담장자가 확인 후 안내해드립니다.</p>
    <form action="#" method="get">
        <FIeldset>
            <legend>상담 신청 정보</legend>
            <ul>
                <li>
                    <label for="name">이름 *</label>
                    <input type="text" name="name" placeholder="이름을 입력하세요.">
                </li>
                <div>실명을 입력해주세요.</div>
                <li>
                    <label for="useremail">이메일 *</label>
                    <input type="email" name="email" placeholder="example@email.com.">
                </li>
                <div>답변을 받을 이메일 주소를 입력해주세요.</div>
                <li>
                    <label for="userPhone">연락처</label>
                    <input type="text" id="userPhone" placeholder="010-0000-0000">
                </li>
                <li>
                    <label for="course">관심 과정 *</label>
                    <select name="course">
                        <option value="선택">선택하세요</option>
                        <option value="HTML">HTML</option>
                        <option value="CSS">CSS</option>
                        <option value="JavaScript">JavaScript</option>
                        <option value="React">React</option>
                        <option value="프론트엔드">프론트엔드</option>
                        </select>
                </li>
                <li>
                    <label for="message">문의내용</label>
                    <textarea id="message" placeholder="궁금한 내용을 자세히 입력해 주세요"></textarea>
                    <p class="example-text">예: 수업 일정, 수강 대상, 비용, 프로젝트 중심 수업 여부 등</p>
                </li>
                <li>
                    <input type="checkbox" id="agree">
                    <label for="agree">개인정보 수집에 동의합니다. *</label>
                </li>
            <button type="submit">상담 문의 보내기</button>
            </ul>
        </FIeldset>
    </form>
</body>
</html>
