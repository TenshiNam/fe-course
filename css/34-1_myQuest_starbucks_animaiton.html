<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Starbucks Menu</title>
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nanum+Gothic&display=swap" rel="stylesheet">
    <style>
        * { 
            font-family: 'Nanum Gothic';
            /* background-color: rgb(246, 245, 239); */
        }
        body {
            background-color: rgb(246, 245, 239);
        }
        header {
            /* border: 1px solid red; */
            width: 1100px;
            margin: auto;
            display: flex;  
            justify-content: space-between;
            padding: 20px 0;
            background-color: transparent;          
        }
        .header-menu-top ul, 
        .header-menu-bottom ul,
        .header-menu-top li,
        .header-menu-bottom li {
            background-color: transparent;
        }
        .header-menu-top ul, 
        .header-menu-bottom ul {
            display: flex;
            list-style: none;
            /* border: 1px solid blue; */
            justify-content: right;
        }
        .header-menu-top ul { 
            gap: 20px;
            font-size: .9rem;
        }
        .header-menu-bottom ul { gap: 30px; }
        .header-menu-top ul a, 
        .header-menu-bottom ul a {
            text-decoration: none;
            color: #333;
        }
        .header-menu-bottom ul a {
            letter-spacing: .5px;
            font-size: .9rem;
        }
        .header-menu-top li:last-child {
            border: 1px solid gray;
            border-radius: 4px;
            padding: 5px;
            background-color: white;
        }
        .header-menu-top li:last-child i{
            font-size: 1.5rem;
            font-weight: 700;
            background-color: white;
        }
        .header-menu-top li:last-child input{
            display: none;
        }
        #main {
            width: 100%;
        }
        .visual {
            width: 100%;
            height: 646px;
            background-image: url("../images/bg_spring_visual.jpg");
            background-repeat: no-repeat;
            background-position: center;
            background-size: cover;
            display: flex;
            justify-content: center;
        }
        .visual .inner {
            width: 1100px;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: relative;
        }
        .title-group {
            color: #a476ad;
            margin-left: -200px;
            z-index: 2;
           
        }

        .main-title {
            font-size: 60px;
            font-weight: bold;
            line-height: 1.2;
            margin-bottom: 20px;
        }
        .btn-detail {
            display: inline-block;
            padding: 10px 30px;
            border: 2px solid #a476ad;
            border-radius: 5px;
            color: #a476ad;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-detail:hover {
            text-decoration: underline;
            background-color: #a476ad;
            color: white;
        }
        .drink-group {
            display: flex;
            align-items: flex-end;
            gap: 15px;
            position: absolute;
            right: -60px;
            bottom: 150px;
        }
        .drink {
            width: 250px;
        }
        .drink img {
            width: 100%;
            height: auto;
            filter: drop-shadow(0 10px 10px rgba(0,0,0,0.05));
        }
        .drink:nth-child(2) {
            margin-left: -85px;
        }
        .drink:nth-child(3) {
            margin-left: -125px;
        }
        .drink:nth-child(4) {
             margin-bottom: -20px;
             margin-left: -70px; 
        }
        .drink:nth-child(5) {
             margin-bottom: -70px;
             margin-left: -100px; 
        }
        
        @keyframes fade-in {
            0% {
                opacity: 0;
                }
            100% {
                opacity: 1;
                }
            }

        .drink {
            opacity: 0; 
            animation: fade-in 0.7s ease-in forwards; 
        }

        .drink:nth-child(1) { animation-delay: 0.4s; }
        .drink:nth-child(2) { animation-delay: 0.8s; }
        .drink:nth-child(3) { animation-delay: 1.2s; }
        .drink:nth-child(4) { animation-delay: 1.6s; }
        .drink:nth-child(5) { animation-delay: 2.0s; }

    </style>
</head>
<body>
    <header>
        <div class="header-logo">
            <img src="https://www.starbucks.co.kr/common/img/common/logo.png" alt="Logo">
        </div>
        <div class="header-menu">
            <nav class="header-menu-top">
                <ul>
                    <li><a href="#">Sign In</a></li>
                    <li><a href="#">My Starbucks</a></li>
                    <li><a href="#">Customer Service & Ideas</a></li>
                    <li><a href="#">Find a Store</a></li>
                    <li>
                        <input type="text">
                        <a href="#"><i class="fa-brands fa-sistrix"></i></a>
                    </li>
                </ul>
            </nav>
            <nav class="header-menu-bottom">
                <ul>
                    <li><a href="#">COFFEE</a></li>
                    <li><a href="#">MENU</a></li>
                    <li><a href="#">STORE</a></li>
                    <li><a href="#">ESG</a></li>
                    <li><a href="#">STARBUCKS REWARDS</a></li>
                    <li><a href="#">CORPORATE SALES</a></li>
                    <li><a href="#">WHAT'S NEW</a></li>
                </ul>
            </nav>
        </div>
    </header>
    <main id="main">
        <section class="visual">
            <div class="inner">
                <div class="title-group">
                    <h1 class="main-title">Bloom into<br>Spring Vibes</h1>
                    <a href="javascript:void(0)" class="btn-detail">자세히 보기</a>
                </div>
                <div class="drink-group">
                    <div class="drink">
                        <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink01_260220.png" alt="슈크림 라떼">
                    </div>
                    <div class="drink">
                        <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink02_260220.png" alt="슈 폼 라떼">
                    </div>
                    <div class="drink">
                        <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink03_260220.png" alt="슈크림 말차 라떼">
                    </div>
                    <div class="drink">
                        <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink04_260220.png" alt="슈크림 딸기 라떼">
                    </div>
                    <div class="drink">
                        <img src="https://image.istarbucks.co.kr/upload/common/img/main/2026/2026_spring1_ph1_top_drink05_260220.png" alt="체리 블라썸 백도 크림 프라푸치노">
                    </div>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
