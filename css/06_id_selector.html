<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ID Selector</title>
    <meta name="description" content="ID Selector">

    <style>
        *{ margin: 0;}
        #title1 {
            /* 글자색 : tomato, 크기 300px, 높이:400px, 배경색 : green */
            color: tomato;
            width: 300px;
            height: 400px;
            background-color: green;
        }
        #title2 {
            /* 글자색 : tomato, 배경색 : yellow */
            color: tomato;
            background-color: yellow;
        }
        #h3 {
            /* 글자색 : blue, 배경색 : yellow */
            color: blue;
            background-color: yellow;
        }
    </style>
</head>
<body>
    <h1 id="title1">ID Selector #1</h1>
    <h1 id="title2">ID Selector #2</h1>
    <h1 id="title3">ID Selector #3</h1>
</body>
</html>
