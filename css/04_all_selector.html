<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Universal Selector</title>
    <meta name="description" content="Universal Selector">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 공통 프로퍼티를 변수로 정의 */
            --color-main :aquamarine;
        }
        *{
            /* 전체 영억에 공통적인 속성을 정의하는 경우 */
            /* background-color: aquamarine; */
            background-color: var( --color-main);
            /* font-family: "Courier New", "맑은 고딕"; */
            font-family: "Open Sans", sans-serif;
            margin: 0;
        }
        /* h1같이 특별구역이 우선 순위가 있다. */
        h1 {
            background-color: var(---color-main);
            color: green;
            background-color: yellow;
        }
        /* 같은 구역이 여러번 나오면 제일 마지막이 적용된다.ㅋ */
        h1, div {
            background-color: red;
        }
        h3 {
            background-color: aqua;
        }
        p {
            background-color: greenyellow;
        }
    </style>
</head>
<body>
    <h1>
        Universal(All) Selector
    </h1>
    <div>
        <h3>Sub Title</h3>
        <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Veritatis rerum autem saepe facilis, sit aliquid corporis fuga commodi exercitationem nisi ipsam distinctio, similique rem, quos enim eum at dolor ullam?

        </p>
    </div>
</body>
</html>
