<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Attribute Selector</title>
    <meta name="description" content="Attribute Selector">
    <style>
        a[href="https://www.naver.com/"] {
            color: red;
            text-decoration: none;
        }
        a[target="_self"] { color: green;}
        /* a[href="https://www.naver.com/"], a[href="https://www.daum.net/"] {
            background-color: yellow;
        } */
        /* a[target="_blank"] {background-color: yellow;} */

        /*  *= inner로 시작하는 모든 class 속성을 대상으로 함. */
        a[class*="inner"] { background-color: yellow;}
    </style>
</head>
<body>
    <h1>Attribute Selector</h1>
    <a href="#" class="inner_1">테스트 1</a>
    <a href="https://www.naver.com/" target="_blank">네이버</a>
    <a href="https://www.google.co.kr/" target="_self">구글</a>
    <a href="https://www.daum.net/" target="_blank">다음</a>
    <a href="#" class="inner_2">테스트 2</a>
</body>
</html>
